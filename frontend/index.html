<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <meta name="theme-color" content="#070908">
  <title>Tail.Link</title>
  <style>
    :root {
      color-scheme: dark;
      --background: #070908;
      --text: #edf1ef;
      --muted: #7f8984;
      --accent: #00f58a;
      --line: rgba(237, 241, 239, 0.14);
    }

    * { box-sizing: border-box; }

    body {
      min-width: 320px;
      min-height: 100vh;
      margin: 0;
      background:
        radial-gradient(circle at 50% 28%, rgba(0, 245, 138, 0.08), transparent 30rem),
        var(--background);
      color: var(--text);
      font-family: -apple-system, BlinkMacSystemFont, "PingFang SC", "Microsoft YaHei", sans-serif;
      -webkit-font-smoothing: antialiased;
    }

    .page {
      display: grid;
      grid-template-rows: 1fr auto;
      min-height: 100vh;
      justify-items: center;
      padding: 48px 24px 28px;
    }

    .content {
      width: min(100%, 380px);
      align-self: center;
      text-align: center;
    }

    .mark {
      width: 76px;
      height: 76px;
      margin: 0 auto 20px;
      color: var(--accent);
      filter: drop-shadow(0 0 16px rgba(0, 245, 138, 0.18));
    }

    h1 {
      margin: 0 0 34px;
      color: #fff;
      font-size: clamp(2rem, 8vw, 2.7rem);
      font-weight: 800;
      letter-spacing: -0.07em;
    }

    h1 span { color: var(--accent); }

    .company-info {
      margin: 0;
      padding: 18px 0;
      border-top: 1px solid var(--line);
      border-bottom: 1px solid var(--line);
      color: var(--muted);
      font-size: 12px;
      line-height: 1.85;
      letter-spacing: 0.01em;
    }

    .company-info div {
      display: grid;
      grid-template-columns: 5.5em 1fr;
      gap: 10px;
      padding: 3px 0;
      text-align: left;
    }

    dt { color: #a8b0ad; }
    dd { margin: 0; color: var(--text); word-break: break-word; }

    .filing {
      color: var(--muted);
      font-size: 11px;
      line-height: 1.5;
    }

    .filing a {
      color: inherit;
      text-decoration: none;
    }

    .filing a:focus-visible,
    .filing a:hover {
      color: var(--text);
      text-decoration: underline;
      text-underline-offset: 3px;
    }

    @media (max-width: 360px) {
      .page { padding-inline: 20px; }
      .company-info { font-size: 11px; }
      .company-info div { gap: 6px; }
    }
  </style>
</head>
<body>
  <div class="page">
    <div class="content">
      <svg class="mark" viewBox="0 0 120 120" fill="none" aria-hidden="true">
        <circle cx="36" cy="60" r="27" stroke="currentColor" stroke-width="3" opacity="0.55"></circle>
        <circle cx="36" cy="60" r="17" stroke="currentColor" stroke-width="3"></circle>
        <circle cx="36" cy="60" r="6" fill="currentColor"></circle>
        <circle cx="84" cy="60" r="27" stroke="currentColor" stroke-width="3" opacity="0.55"></circle>
        <circle cx="84" cy="60" r="17" stroke="currentColor" stroke-width="3"></circle>
        <circle cx="84" cy="60" r="6" fill="currentColor"></circle>
        <circle cx="60" cy="60" r="4" fill="currentColor"></circle>
      </svg>

      <h1>Tail<span>.Link</span></h1>

      <main aria-label="公司信息">
        <dl class="company-info">
          <div><dt>公司名称</dt><dd>深圳念新科技有限公司</dd></div>
          <div><dt>法人</dt><dd>高翔</dd></div>
          <div><dt>主要业务</dt><dd>办公技能的培训</dd></div>
          <div><dt>地址</dt><dd>深圳市福田区碧华庭居清园1栋2B</dd></div>
          <div><dt>联系电话</dt><dd>13751196386</dd></div>
          <div><dt>电子邮箱</dt><dd>348942587@qq.com</dd></div>
        </dl>
      </main>
    </div>

    <footer class="filing">
      <a href="https://beian.miit.gov.cn/" target="_blank" rel="noopener noreferrer">粤ICP备2026089185号</a>
    </footer>
  </div>
</body>
</html>
