# Tail.Link Nginx 反向代理配置
# 部署到 /etc/nginx/sites-available/tail-link 并软链到 sites-enabled
# 用法: sudo ln -s /etc/nginx/sites-available/tail-link /etc/nginx/sites-enabled/

# HTTP -> HTTPS 跳转
server {
    listen 80;
    server_name _SERVER_NAME_;

    # certbot 验证用
    location /.well-known/acme-challenge/ {
        root /var/www/html;
    }

    location / {
        return 301 https://$host$request_uri;
    }
}

# HTTPS 主站
server {
    listen 443 ssl http2;
    server_name _SERVER_NAME_;

    # 证书路径（certbot 生成后替换）
    ssl_certificate     /etc/letsencrypt/live/_SERVER_NAME_/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/_SERVER_NAME_/privkey.pem;

    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_ciphers HIGH:!aNULL:!MD5;
    ssl_prefer_server_ciphers on;

    client_max_body_size 10m;

    # 前端静态文件直接由 Nginx 启服务（更快）
    location / {
        proxy_pass http://127.0.0.1:8000;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # API 反向代理到 uvicorn
    location /api/ {
        proxy_pass http://127.0.0.1:8000;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
}
